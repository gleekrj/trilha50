# Ambiente GitHub: DEV — crie em Settings → Environments com o nome exato "DEV".
# Ajuste os passos abaixo para seu provedor (Azure, AWS, VM, etc.).

name: Deploy DEV

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Publicar artefatos (exemplo)
        uses: actions/upload-artifact@v4
        with:
          name: trilha50-dev-build
          path: |
            backend/dist
            frontend/dist
      - name: Próximo passo
        run: |
          echo "Configure deploy real neste job usando secrets do ambiente DEV (ex.: API keys, connection strings)."
