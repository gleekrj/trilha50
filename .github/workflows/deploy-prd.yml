# Ambiente GitHub: PRD — recomenda-se proteção com revisores obrigatórios e secrets de produção.
# Secret obrigatório no ambiente PRD: DATABASE_URL (mesma variável usada pelo Nest em runtime).

name: Deploy PRD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PRD
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependências e gerar Prisma Client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm ci
          npx prisma generate
      - name: Aplicar migrations no banco (Prisma)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy
      - name: Compilar backend
        working-directory: backend
        run: npm run build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Publicar artefatos (exemplo)
        uses: actions/upload-artifact@v4
        with:
          name: trilha50-prd-build
          path: |
            backend/dist
            frontend/dist
      - name: Próximo passo
        run: |
          echo "Configure deploy real neste job usando secrets do ambiente PRD."
